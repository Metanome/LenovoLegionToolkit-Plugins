name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LLT_SOURCE: ${{ github.workspace }}\core-app

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name to attach to (e.g., latest)'
        required: true
      channel:
        description: 'Release channel'
        required: true
        default: Stable
        type: choice
        options:
          - Stable
          - Beta
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-2022

    steps:
    - name: Checkout Plugins
      uses: actions/checkout@v5
      
    - name: Checkout Core App
      uses: actions/checkout@v5
      with:
        repository: 'LenovoLegionToolkit-Team/LenovoLegionToolkit'
        path: 'core-app'
        ref: 'dev'
        sparse-checkout: |
          LenovoLegionToolkit.Lib

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 9.0.x
        cache: true
        cache-dependency-path: '**/*.csproj'
        
    - name: Resolve release metadata
      id: release_meta
      env:
        INPUT_TAG_NAME: ${{ github.event.inputs.tag_name }}
        INPUT_CHANNEL: ${{ github.event.inputs.channel }}
        EVENT_NAME: ${{ github.event_name }}
      run: |
        $channel = "Stable"
        $prerelease = "false"
        $targetCommitish = "main"

        if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $tagName = $env:INPUT_TAG_NAME
            $channel = $env:INPUT_CHANNEL
        } else {
            $tagName = "${{ github.event.release.tag_name }}"
            $isPrerelease = "${{ github.event.release.prerelease }}"
            
            if ($isPrerelease -eq "true") {
                $channel = "Beta"
            } else {
                $channel = "Stable"
            }
        }

        switch ($channel) {
            "Stable" {
                $prerelease = "false"
                $targetCommitish = "main"
            }
            "Beta" {
                $prerelease = "true"
                $targetCommitish = "main"
            }
            default {
                Write-Error "Unsupported channel: $channel"
                exit 1
            }
        }

        "channel=$channel" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "target_commitish=$targetCommitish" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      shell: powershell

    - name: Restore Plugins
      run: dotnet restore LenovoLegionToolkit-Plugins.slnx
      
    - name: Build All Plugins
      run: dotnet build LenovoLegionToolkit-Plugins.slnx -c Release --no-restore
      
    - name: Package Plugins
      run: |
        $excludeDirs = @("AssemblyVersionPatcher", ".git", ".github", ".vs", "core-app")
        $pluginDirs = Get-ChildItem -Directory | Where-Object { $_.Name -notin $excludeDirs }
        
        foreach ($dir in $pluginDirs) {
            $csproj = "$($dir.Name)\$($dir.Name).csproj"
            if (Test-Path $csproj) {
                $pluginName = $($dir.Name)
                Write-Host "Publishing $pluginName..."
                dotnet publish $csproj -c Release -o "build_out\Plugins\$pluginName"
                
                Write-Host "Zipping $pluginName..."
                $filesToZip = @(
                    "build_out\Plugins\$pluginName\$pluginName.dll"
                ) | Where-Object { Test-Path $_ }
                
                if ($filesToZip.Count -gt 0) {
                    Compress-Archive -Path $filesToZip -DestinationPath "build_out\$pluginName.zip"
                }
            }
        }
      shell: powershell

    - name: Update Release (Published)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2.0.8
      with:
        tag_name: ${{ steps.release_meta.outputs.tag_name }}
        target_commitish: ${{ steps.release_meta.outputs.target_commitish }}
        prerelease: ${{ steps.release_meta.outputs.prerelease }}
        name: Lenovo Legion Toolkit Plugins
        files: build_out/*.zip
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Draft Release (Manual)
      if: github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2.0.8
      with:
        draft: true
        tag_name: ${{ steps.release_meta.outputs.tag_name }}
        target_commitish: ${{ steps.release_meta.outputs.target_commitish }}
        prerelease: ${{ steps.release_meta.outputs.prerelease }}
        name: Lenovo Legion Toolkit Plugins
        body: |
          ## Plugins Update
          Channel: ${{ steps.release_meta.outputs.channel }}
        files: build_out/*.zip
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: plugins-${{ steps.release_meta.outputs.tag_name }}
        path: build_out/*.zip
